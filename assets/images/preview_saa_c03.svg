<svg viewBox="0 0 1200 630"
  xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#232F3E"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#146EB4;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>

  <!-- AWS Logo Icon (simplified cloud) -->
  <g transform="translate(100, 80)">
    <path d="M 0 30 Q 0 0 30 0 L 70 0 Q 100 0 100 30 L 100 50 Q 100 80 70 80 L 30 80 Q 0 80 0 50 Z" fill="#FF9900" opacity="0.8"/>
    <rect x="10" y="40" width="15" height="30" fill="#232F3E" rx="3"/>
    <rect x="35" y="35" width="15" height="35" fill="#232F3E" rx="3"/>
    <rect x="60" y="30" width="15" height="40" fill="#232F3E" rx="3"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    AWS SAA-C03
  </text>

  <!-- Subtitle -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="32" fill="#FF9900" text-anchor="middle">
    Solutions Architect Associate
  </text>

  <!-- Description -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="24" fill="#CCCCCC" text-anchor="middle">
    Practice Quiz • 36 Questions
  </text>

  <!-- Feature boxes -->
  <g transform="translate(200, 350)">
    <!-- Box 1 -->
    <rect x="0" y="0" width="250" height="120" fill="#37475A" rx="8"/>
    <text x="125" y="35" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FF9900" text-anchor="middle">36</text>
    <text x="125" y="65" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Questions</text>
    <text x="125" y="90" font-family="Arial, sans-serif" font-size="14" fill="#AAB7B8" text-anchor="middle">All SAA-C03 Domains</text>

    <!-- Box 2 -->
    <rect x="280" y="0" width="250" height="120" fill="#37475A" rx="8"/>
    <text x="405" y="35" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#146EB4" text-anchor="middle">7</text>
    <text x="405" y="65" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Question Types</text>
    <text x="405" y="90" font-family="Arial, sans-serif" font-size="14" fill="#AAB7B8" text-anchor="middle">Multi, Ordering, Matching</text>

    <!-- Box 3 -->
    <rect x="560" y="0" width="250" height="120" fill="#37475A" rx="8"/>
    <text x="685" y="35" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FF9900" text-anchor="middle">4</text>
    <text x="685" y="65" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Case Studies</text>
    <text x="685" y="90" font-family="Arial, sans-serif" font-size="14" fill="#AAB7B8" text-anchor="middle">Real-world Scenarios</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="610" width="1200" height="20" fill="#FF9900" opacity="0.3"/>

  <!-- AWS Service Icons (simplified) -->
  <g transform="translate(100, 520)" opacity="0.3">
    <circle cx="0" cy="0" r="15" fill="#FF9900"/>
    <circle cx="50" cy="0" r="15" fill="#146EB4"/>
    <circle cx="100" cy="0" r="15" fill="#FF9900"/>
    <circle cx="150" cy="0" r="15" fill="#146EB4"/>
    <circle cx="200" cy="0" r="15" fill="#FF9900"/>
  </g>

  <g transform="translate(900, 520)" opacity="0.3">
    <circle cx="0" cy="0" r="15" fill="#FF9900"/>
    <circle cx="50" cy="0" r="15" fill="#146EB4"/>
    <circle cx="100" cy="0" r="15" fill="#FF9900"/>
    <circle cx="150" cy="0" r="15" fill="#146EB4"/>
    <circle cx="200" cy="0" r="15" fill="#FF9900"/>
  </g>
</svg>
