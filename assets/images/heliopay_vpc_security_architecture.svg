<svg viewBox="0 0 800 600"
  xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#232F3E" text-anchor="middle">
    HelioPay VPC Security Architecture
  </text>

  <!-- VPC Container -->
  <rect x="50" y="60" width="700" height="500" fill="#E8F4F8" stroke="#146EB4" stroke-width="3" rx="5"/>
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#146EB4">
    VPC (10.0.0.0/16)
  </text>

  <!-- Public Subnet 1 -->
  <rect x="80" y="110" width="300" height="200" fill="#B7D3E8" stroke="#146EB4" stroke-width="2" rx="5"/>
  <text x="90" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#146EB4">
    Public Subnet 1 (10.0.1.0/24) - AZ-1
  </text>

  <!-- NAT Gateway -->
  <g id="nat-gateway-1">
    <rect x="110" y="160" width="120" height="60" fill="#FF9900" stroke="#232F3E" stroke-width="2" rx="5"/>
    <text x="170" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      NAT Gateway
    </text>
    <text x="170" y="205" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">
      nat-12345
    </text>
  </g>

  <!-- ALB -->
  <g id="alb">
    <rect x="250" y="160" width="110" height="60" fill="#FF9900" stroke="#232F3E" stroke-width="2" rx="5"/>
    <text x="305" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      ALB
    </text>
    <text x="305" y="205" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">
      Load Balancer
    </text>
  </g>

  <!-- Public Subnet 2 -->
  <rect x="420" y="110" width="300" height="200" fill="#B7D3E8" stroke="#146EB4" stroke-width="2" rx="5"/>
  <text x="430" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#146EB4">
    Public Subnet 2 (10.0.2.0/24) - AZ-2
  </text>

  <!-- NAT Gateway 2 -->
  <g id="nat-gateway-2">
    <rect x="550" y="160" width="120" height="60" fill="#FF9900" stroke="#232F3E" stroke-width="2" rx="5"/>
    <text x="610" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      NAT Gateway
    </text>
    <text x="610" y="205" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">
      nat-67890
    </text>
  </g>

  <!-- Private Subnet 1 -->
  <rect x="80" y="330" width="300" height="200" fill="#D4E8D4" stroke="#2D882D" stroke-width="2" rx="5"/>
  <text x="90" y="355" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D882D">
    Private Subnet 1 (10.0.11.0/24) - AZ-1
  </text>

  <!-- App Servers AZ-1 -->
  <g id="app-servers-az1">
    <rect x="110" y="380" width="100" height="50" fill="#527FFF" stroke="#232F3E" stroke-width="2" rx="5"/>
    <text x="160" y="400" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      App Servers
    </text>
    <text x="160" y="415" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">
      EC2 Instances
    </text>
  </g>

  <!-- RDS Primary -->
  <g id="rds-primary">
    <rect x="250" y="380" width="100" height="50" fill="#3B48CC" stroke="#232F3E" stroke-width="2" rx="5"/>
    <text x="300" y="400" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      RDS Primary
    </text>
    <text x="300" y="415" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">
      PostgreSQL
    </text>
  </g>

  <!-- Private Subnet 2 -->
  <rect x="420" y="330" width="300" height="200" fill="#D4E8D4" stroke="#2D882D" stroke-width="2" rx="5"/>
  <text x="430" y="355" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D882D">
    Private Subnet 2 (10.0.12.0/24) - AZ-2
  </text>

  <!-- App Servers AZ-2 -->
  <g id="app-servers-az2">
    <rect x="450" y="380" width="100" height="50" fill="#527FFF" stroke="#232F3E" stroke-width="2" rx="5"/>
    <text x="500" y="400" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      App Servers
    </text>
    <text x="500" y="415" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">
      EC2 Instances
    </text>
  </g>

  <!-- RDS Standby -->
  <g id="rds-standby">
    <rect x="590" y="380" width="100" height="50" fill="#3B48CC" stroke="#232F3E" stroke-width="2" rx="5"/>
    <text x="640" y="400" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      RDS Standby
    </text>
    <text x="640" y="415" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">
      Multi-AZ
    </text>
  </g>

  <!-- Internet Gateway -->
  <g id="igw">
    <rect x="350" y="10" width="100" height="40" fill="#FF9900" stroke="#232F3E" stroke-width="2" rx="5"/>
    <text x="400" y="35" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      Internet GW
    </text>
  </g>

  <!-- Connection lines -->
  <line x1="400" y1="50" x2="305" y2="160" stroke="#146EB4" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="305" y1="220" x2="160" y2="380" stroke="#2D882D" stroke-width="2"/>
  <line x1="305" y1="220" x2="500" y2="380" stroke="#2D882D" stroke-width="2"/>
  <line x1="170" y1="220" x2="170" y2="300" stroke="#146EB4" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="610" y1="220" x2="610" y2="300" stroke="#146EB4" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#146EB4" />
    </marker>
  </defs>

  <!-- Hotspot indicators (clickable areas for question) -->
  <circle cx="170" cy="190" r="25" fill="transparent" stroke="#FF0000" stroke-width="3" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="170" y="195" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FF0000" text-anchor="middle">A</text>

  <circle cx="305" cy="190" r="25" fill="transparent" stroke="#FF0000" stroke-width="3" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="305" y="195" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FF0000" text-anchor="middle">B</text>

  <circle cx="160" cy="405" r="25" fill="transparent" stroke="#FF0000" stroke-width="3" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="160" y="410" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FF0000" text-anchor="middle">C</text>

  <circle cx="300" cy="405" r="25" fill="transparent" stroke="#FF0000" stroke-width="3" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="300" y="410" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FF0000" text-anchor="middle">D</text>
</svg>
